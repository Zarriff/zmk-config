# Configuration for keymap-drawer (https://github.com/caksoylar/keymap-drawer)
# Used by scripts/draw-keymap.sh to render SVG/PDF into keymap-drawer/
parse_config:
  # key-labels header cached by the script; provides LB2-style positions
  zmk_additional_includes:
    - ".zmk/keymap-drawer/include"
  raw_binding_map:
    "&caps_word": CAPS
    "&sys_reset": RESET
    "&bootloader": BOOT
    "&studio_unlock": UNLOCK
    "&rgb_ug RGB_TOG": RGB
    "&num_word 2": NUM WORD
    "&nav_word 1": NAV WORD
    "&tap_once LG(SPACE)": CONTEXTS
  zmk_keycode_map:
    EXCLAMATION: '!'
    EXCL: '!'
    AT_SIGN: '@'
    AT: '@'
    HASH: '#'
    POUND: '#'
    DOLLAR: $
    DLLR: $
    PERCENT: '%'
    PRCNT: '%'
    CARET: ^
    AMPERSAND: '&'
    AMPS: '&'
    ASTERISK: '*'
    ASTRK: '*'
    STAR: '*'
    LEFT_PARENTHESIS: (
    LPAR: (
    RIGHT_PARENTHESIS: )
    RPAR: )
    EQUAL: '='
    PLUS: +
    MINUS: '-'
    UNDERSCORE: _
    UNDER: _
    SLASH: /
    FSLH: /
    QUESTION: '?'
    QMARK: '?'
    BACKSLASH: \
    BSLH: \
    PIPE: '|'
    NON_US_BACKSLASH: \
    PIPE2: '|'
    NON_US_BSLH: '|'
    SEMICOLON: ;
    SEMI: ;
    COLON: ':'
    SINGLE_QUOTE: ''''
    SQT: ''''
    APOSTROPHE: ''''
    APOS: ''''
    DOUBLE_QUOTES: '"'
    DQT: '"'
    COMMA: ','
    LESS_THAN: <
    LT: <
    PERIOD: .
    DOT: .
    GREATER_THAN: '>'
    GT: '>'
    LEFT_BRACKET: '['
    LBKT: '['
    LEFT_BRACE: '{'
    LBRC: '{'
    RIGHT_BRACKET: ']'
    RBKT: ']'
    RIGHT_BRACE: '}'
    RBRC: '}'
    GRAVE: '`'
    TILDE: '~'
    NON_US_HASH: '#'
    NUHS: '#'
    TILDE2: '~'
    "LC(LS(LALT))": Meh
    "LC(LS(LA(LGUI)))": Hyper
